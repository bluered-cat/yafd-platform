server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      grpc:
        enabled: false
      filter:
        json-to-grpc:
          enabled: false
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "${CORS_ALLOWED_ORIGINS:http://localhost:3000}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # Account Service
        - id: account-service
          uri: ${ACCOUNT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/accounts/**
        # Rider endpoints (Account Service)
        - id: rider-service
          uri: ${ACCOUNT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/riders/**
        # Menu Service — Restaurants (public)
        - id: restaurant-service
          uri: ${MENU_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/restaurants/**
        # Menu Service — Batch endpoint (internal)
        - id: menu-items-batch
          uri: ${MENU_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/menu-items/**
        # Order Service
        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/orders/**
        # Voucher Service
        - id: voucher-service
          uri: ${VOUCHER_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/vouchers/**
        # Payment Service — Payment Methods
        - id: payment-method-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/payment-methods/**
        # Payment Service — Payments
        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/payments/**

firebase:
  project-id: ${FIREBASE_PROJECT_ID:yafd-c0f20}
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:src/main/resources/firebase-service-account.json}

gateway:
  auth:
    public-paths: /api/restaurants/**,/api/restaurants/search,/api/menu-items/**