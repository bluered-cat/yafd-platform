server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      grpc:
        enabled: false
      filter:
        json-to-grpc:
          enabled: false
      routes:
        # Account Service
        - id: account-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/accounts/**

firebase:
  project-id: ${FIREBASE_PROJECT_ID:yafd-c0f20}
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:src/main/resources/firebase-service-account.json}
