name: Docker Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com
  ECS_CLUSTER: default

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend
  # ─────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }} \
            --build-arg REACT_APP_FIREBASE_API_KEY=${{ secrets.REACT_APP_FIREBASE_API_KEY }} \
            --build-arg REACT_APP_FIREBASE_AUTH_DOMAIN=${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }} \
            --build-arg REACT_APP_FIREBASE_PROJECT_ID=${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }} \
            --build-arg REACT_APP_FIREBASE_STORAGE_BUCKET=${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }} \
            --build-arg REACT_APP_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg REACT_APP_FIREBASE_APP_ID=${{ secrets.REACT_APP_FIREBASE_APP_ID }} \
            -t $ECR_REGISTRY/yafd-frontend:${{ github.sha }} \
            -t $ECR_REGISTRY/yafd-frontend:latest \
            ./frontend

      - name: Push image to ECR
        if: github.ref == 'refs/heads/main'
        run: |
          docker push $ECR_REGISTRY/yafd-frontend:${{ github.sha }}
          docker push $ECR_REGISTRY/yafd-frontend:latest

      - name: Download task definition
        if: github.ref == 'refs/heads/main'
        run: |
          aws ecs describe-task-definition --task-definition yafd-frontend-task \
            --query taskDefinition > task-definition.json
          jq 'del(.enableFaultInjection)' task-definition.json > clean.json && mv clean.json task-definition.json

      - name: Update task definition with new image
        if: github.ref == 'refs/heads/main'
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: yafd-frontend
          image: ${{ env.ECR_REGISTRY }}/yafd-frontend:${{ github.sha }}

      - name: Deploy to ECS
        if: github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: yafd-frontend-task-service-2
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Account Service
