version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: yafd-postgres
    environment:
      POSTGRES_USER: yafd
      POSTGRES_PASSWORD: yafd_password
      POSTGRES_DB: yafd_accounts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yafd"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

