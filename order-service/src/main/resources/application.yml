server:
  port: 8083

spring:
  application:
    name: order-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/yafd_orders}
    username: ${DB_USERNAME:yafd}
    password: ${DB_PASSWORD:yafd_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Service URLs for inter-service communication
services:
  account-url: ${ACCOUNT_SERVICE_URL:http://localhost:8081}
  menu-url: ${MENU_SERVICE_URL:http://localhost:8082}
  voucher-url: ${VOUCHER_SERVICE_URL:http://localhost:8084}
  payment-url: ${PAYMENT_SERVICE_URL:http://localhost:8085}
